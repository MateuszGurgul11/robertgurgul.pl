services:
  - type: web
    name: robertgurgul-backend
    runtime: docker
    plan: free
    region: frankfurt
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_EMAIL_TO
        sync: false
      - key: CONTACT_EMAIL_FROM
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
